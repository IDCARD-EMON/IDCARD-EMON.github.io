<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital ID Card</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FAFAF7;
    --ink:#16181D;
    --ink-soft:#5B5E66;
    --accent:#B8935F;
    --accent-soft:#E9DCC8;
    --hairline:#E4E1D8;
    --card-w:380px;
  }

  *{ box-sizing:border-box; }

  body{
    margin:0;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:var(--bg);
    background-image:
      radial-gradient(circle at 1px 1px, rgba(22,24,29,0.05) 1px, transparent 0);
    background-size: 22px 22px;
    font-family:'Inter', sans-serif;
    color:var(--ink);
    padding:32px 16px;
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation:none !important; transition:none !important; }
  }

  .card{
    position:relative;
    width:var(--card-w);
    max-width:100%;
    background:#FFFFFF;
    border-radius:18px;
    box-shadow:0 1px 2px rgba(22,24,29,0.04), 0 24px 48px -16px rgba(22,24,29,0.18);
    overflow:hidden;
    padding:36px 30px 28px 38px;
    opacity:0;
    transform:translateY(18px) rotateX(6deg);
    transform-origin:top center;
    animation:cardIn 0.7s cubic-bezier(.2,.7,.3,1) 0.05s forwards;
  }

  @keyframes cardIn{
    to{ opacity:1; transform:translateY(0) rotateX(0deg); }
  }

  .stripe{
    position:absolute;
    left:0; top:0; bottom:0;
    width:6px;
    background:linear-gradient(180deg, var(--accent) 0%, var(--accent-soft) 100%);
  }

  .top-row{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    margin-bottom:22px;
    opacity:0;
    animation:fadeUp 0.6s ease 0.25s forwards;
  }

  .org{
    font-size:11px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--ink-soft);
    font-weight:500;
  }
  .org strong{
    display:block;
    font-family:'Space Grotesk', sans-serif;
    font-size:14px;
    letter-spacing:0;
    text-transform:none;
    color:var(--ink);
    margin-top:2px;
  }

  .id-tag{
    font-family:'IBM Plex Mono', monospace;
    font-size:10px;
    color:var(--accent);
    text-align:right;
    line-height:1.5;
  }
  .id-tag span{ display:block; color:var(--ink-soft); font-size:9px; letter-spacing:0.08em; }

  .photo-wrap{
    width:96px; height:96px;
    border-radius:14px;
    overflow:hidden;
    margin-bottom:18px;
    box-shadow:0 8px 20px -8px rgba(22,24,29,0.35);
    opacity:0;
    transform:scale(0.85);
    animation:photoIn 0.6s cubic-bezier(.2,.8,.3,1) 0.35s forwards;
  }
  @keyframes photoIn{ to{ opacity:1; transform:scale(1); } }

  .photo-wrap img{ width:100%; height:100%; object-fit:cover; display:block; }

  .name{
    font-family:'Space Grotesk', sans-serif;
    font-weight:700;
    font-size:30px;
    line-height:1.08;
    letter-spacing:-0.01em;
    margin:0 0 6px 0;
    opacity:0;
    transform:translateY(10px);
    animation:fadeUp 0.6s ease 0.45s forwards;
  }

  .role{
    font-size:13.5px;
    color:var(--ink-soft);
    margin:0 0 20px 0;
    opacity:0;
    transform:translateY(10px);
    animation:fadeUp 0.6s ease 0.52s forwards;
  }
  .role strong{ color:var(--ink); font-weight:600; }

  .divider{
    height:1px;
    background:var(--hairline);
    margin:0 0 18px 0;
    transform:scaleX(0);
    transform-origin:left;
    animation:lineIn 0.7s ease 0.6s forwards;
  }
  @keyframes lineIn{ to{ transform:scaleX(1); } }

  @keyframes fadeUp{ to{ opacity:1; transform:translateY(0); } }

  .links{
    display:flex;
    flex-direction:column;
    gap:8px;
  }

  .link{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:13px 14px;
    border-radius:10px;
    text-decoration:none;
    color:var(--ink);
    background:var(--bg);
    border:1px solid var(--hairline);
    opacity:0;
    transform:translateY(10px);
    animation:fadeUp 0.5s ease forwards;
    transition: transform 0.25s cubic-bezier(.2,.8,.3,1), box-shadow 0.25s ease, border-color 0.25s ease;
  }
  .link:nth-child(1){ animation-delay:0.68s; }
  .link:nth-child(2){ animation-delay:0.75s; }
  .link:nth-child(3){ animation-delay:0.82s; }

  .link:hover, .link:active{
    transform:translateY(-2px) rotateX(4deg);
    box-shadow:0 10px 22px -12px rgba(22,24,29,0.3);
    border-color:var(--accent);
  }

  .link-left{
    display:flex;
    align-items:center;
    gap:11px;
  }

  .icon{
    width:30px; height:30px;
    border-radius:8px;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#fff;
    border:1px solid var(--hairline);
    flex-shrink:0;
  }
  .icon svg{ width:15px; height:15px; }

  .link-text{ display:flex; flex-direction:column; }
  .link-label{ font-size:9.5px; text-transform:uppercase; letter-spacing:0.08em; color:var(--ink-soft); }
  .link-value{ font-size:13px; font-weight:500; }

  .arrow{ color:var(--ink-soft); font-size:14px; transition:transform 0.25s ease; }
  .link:hover .arrow{ transform:translate(2px,-2px); color:var(--accent); }

  .footer-note{
    text-align:center;
    font-family:'IBM Plex Mono', monospace;
    font-size:9.5px;
    letter-spacing:0.08em;
    color:var(--ink-soft);
    margin-top:22px;
    opacity:0;
    animation:fadeUp 0.5s ease 0.95s forwards;
  }
</style>
</head>
<body>

<div class="card" id="card">
  <div class="stripe"></div>

  <div class="top-row">
    <div class="org">
      Org Name
      <strong id="orgFull">Computer Science</strong>
    </div>
    <div class="id-tag">
      <span>ID No.</span>
      <span id="idNum">CS-0001</span>
    </div>
  </div>

  <div class="photo-wrap">
    <img id="photo" src="https://images.unsplash.com/photo-1633332755192-727a05c4013d?w=300&h=300&fit=crop" alt="Profile photo">
  </div>

  <h1 class="name" id="name">Anshif TK</h1>
  <p class="role">Media Lead · <strong id="period">2024–2028</strong></p>

  <div class="divider"></div>

  <div class="links">
    <a class="link" id="linkMail" href="mailto:hello@example.com">
      <div class="link-left">
        <span class="icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="#16181D" stroke-width="2"><path d="M4 4h16v16H4z" stroke="none"/><path d="M22 6 12 13 2 6"/><path d="M2 6h20v12H2z"/></svg>
        </span>
        <span class="link-text">
          <span class="link-label">Mail</span>
          <span class="link-value" id="mailValue">hello@example.com</span>
        </span>
      </div>
      <span class="arrow">↗</span>
    </a>

    <a class="link" id="linkInsta" href="https://instagram.com/" target="_blank" rel="noopener">
      <div class="link-left">
        <span class="icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="#16181D" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="#16181D" stroke="none"/></svg>
        </span>
        <span class="link-text">
          <span class="link-label">Instagram</span>
          <span class="link-value" id="instaValue">@username</span>
        </span>
      </div>
      <span class="arrow">↗</span>
    </a>

    <a class="link" id="linkTelegram" href="https://t.me/" target="_blank" rel="noopener">
      <div class="link-left">
        <span class="icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="#16181D" stroke-width="2"><path d="M22 2 11 13"/><path d="M22 2 15 22l-4-9-9-4 20-7Z"/></svg>
        </span>
        <span class="link-text">
          <span class="link-label">Telegram</span>
          <span class="link-value" id="telegramValue">@username</span>
        </span>
      </div>
      <span class="arrow">↗</span>
    </a>
  </div>

  <div class="footer-note">DIGITAL CREDENTIAL · VERIFIED</div>
</div>

<script>
  // ============================================
  // EDIT THIS BLOCK FOR EACH TEAM MEMBER
  // ============================================
  const CONFIG = {
    orgLine: "Start-up name",
    orgFull: "The Mrinmoybabu's startup",
    idNumber: "Not yet",
    photoUrl: "https://images.unsplash.com/photo-1633332755192-727a05c4013d?w=300&h=300&fit=crop",
    name: "Emon Das",
    role: "Marketing and finding clients",
    period: "2026–Present",
    mail: "anirudhdas6969@gmail.com",
    instagramHandle: "introvert_.emonnn_",
    instagramUrl: "https://instagram.com/introvert_.emonnn_",
    telegramHandle: "not yet",
    telegramUrl: "https://t.me/username"
  };
  // ============================================

  document.querySelector('.org').childNodes[0].textContent = CONFIG.orgLine;
  document.getElementById('orgFull').textContent = CONFIG.orgFull;
  document.getElementById('idNum').textContent = CONFIG.idNumber;
  document.getElementById('photo').src = CONFIG.photoUrl;
  document.getElementById('name').textContent = CONFIG.name;
  document.querySelector('.role').childNodes[0].textContent = CONFIG.role + " · ";
  document.getElementById('period').textContent = CONFIG.period;

  document.getElementById('linkMail').href = "mailto:" + CONFIG.mail;
  document.getElementById('mailValue').textContent = CONFIG.mail;

  document.getElementById('linkInsta').href = CONFIG.instagramUrl;
  document.getElementById('instaValue').textContent = "@" + CONFIG.instagramHandle;

  document.getElementById('linkTelegram').href = CONFIG.telegramUrl;
  document.getElementById('telegramValue').textContent = "@" + CONFIG.telegramHandle;
</script>

</body>
</html>
